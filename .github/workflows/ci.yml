# CI — validates every PR and push to main
# Runs formatting, linting, and evaluates all templates.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Optional: uncomment when Cachix account is created
      # - uses: cachix/cachix-action@v15
      #   with:
      #     name: bauer-group
      #     authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Flake check (formatting + linting)
        run: nix flake check --all-systems

      - name: Format check
        run: nix fmt -- --check

  # Note: Full template builds require --impure (params.nix on machine).
  # CI validates formatting, linting, and flake structure.
  # Template builds are validated during deployment on target machines.
