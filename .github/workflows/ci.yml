name: 🧹 CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ❄️ Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: ✅ Flake check
        run: nix flake check --all-systems

  build:
    name: 🔨 Build ${{ matrix.template }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        template:
          - desktop-dev
          - desktop-kiosk
          - server
    steps:
      - uses: actions/checkout@v4

      - name: ❄️ Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: 📦 Build ${{ matrix.template }}
        run: nix build .#nixosConfigurations.${{ matrix.template }}.config.system.build.toplevel --no-link
